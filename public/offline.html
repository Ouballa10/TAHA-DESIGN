<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TAHA DESIGN | Hors ligne</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #f7f2eb 0%, #f1e8dc 100%);
        color: #152229;
      }

      main {
        width: min(92vw, 420px);
        border: 1px solid rgba(21, 34, 41, 0.08);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.86);
        padding: 28px;
        box-shadow: 0 24px 60px rgba(21, 34, 41, 0.08);
      }

      .eyebrow {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #0d6f66;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        font-size: 15px;
        line-height: 1.7;
        color: #617481;
      }

      button {
        margin-top: 22px;
        min-height: 46px;
        border: 0;
        border-radius: 18px;
        padding: 0 18px;
        background: #0d6f66;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Mode hors ligne</p>
      <h1>Connexion indisponible</h1>
      <p>
        L'application est ouverte, mais Internet n'est pas disponible pour charger cette page.
        Reessayez des que la connexion revient.
      </p>
      <button type="button" onclick="window.location.reload()">Reessayer</button>
    </main>
  </body>
</html>
